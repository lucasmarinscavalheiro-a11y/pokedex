<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Pokédex</h1>
    <p class="subititulo">Digite o nome de um Pokémon para pesquisar</p>

    <div class="busca">
        <input type="text" id="inputPokemon"
         placeholder="Ex: Pikachu"
         onkeypress="if(event.key === 'Enter') buscar()"/>
        <button onclick="buscar()">Buscar</button>
    </div>

    <div id="resultado"></div>

    <script>
        async function buscar() {
            const nome = document.getElementById('inputPokemon').value.trim();
            const div = document.getElementById('resultado');
            if (!nome) {
                div.innerHTML = '<p class="erro">Digite o nome.</p>';
                return;
            }
            div.innerHTML = '<div class="carregando">Buscando...</div>';

            try {
                const resposta = await fetch(`/api/pokemon/${nome}`);
                const dados = await resposta.json();

                if (!resposta.ok) {
                    div.innerHTML = `<div class="error">${dados.error || 'Pokémon não encontrado.'}</div>`;
                    return;
                }

                const tiposHTML = dados.tipos.map((t) => `<span class="tipo">${t}</span>`).join(' ');

                div.innerHTML = `<div class="card">
                    <img src="${dados.imagem}" alt="${dados.name}">
                    <h2>${dados.name}</h2>
                    <p class="numero">#${String(dados.id).padStart(3, '0')}</p>
                    <div class='tipos'>${tiposHTML}</div>
                    <div class='info-grid'>
                        <div class='info-item'>
                            <div class='label'>Altura</div>
                            <div class='value'>${dados.altura}</div>
                        </div>
                        <div class='info-item'>
                            <div class='label'>Peso</div>
                            <div class='value'>${dados.peso}</div>
                        </div>
                    </div>
                    <div class='habilidades'>
                        <strong>Habilidades:</strong>
                        ${dados.habilidades.join(', ')}
                    </div>
                </div>`;
            } catch (e) {
                div.innerHTML = '<div class="error">Erro ao conectar com o servidor.</div>';
            }
        }
           
        
    </script>
</body>
</html>
